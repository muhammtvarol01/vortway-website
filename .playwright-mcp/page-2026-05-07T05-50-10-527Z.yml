      - generic [ref=e184]:
        - generic [ref=e185]:
          - button "What documents are required for cross-border shipment?" [ref=e186] [cursor=pointer]:
            - generic [ref=e187]: What documents are required for cross-border shipment?
            - img [ref=e188]
          - paragraph [ref=e190]: "For EU cross-border shipments: CMR consignment note, commercial invoice, and packing list. For cargo entering or leaving the EU, you also need an export/import declaration, EUR.1 certificate of origin (if applicable), and any product-specific permits."
        - generic [ref=e191]:
          - button "What are typical transit times from Vilnius to major EU cities?" [ref=e192] [cursor=pointer]:
            - generic [ref=e193]: What are typical transit times from Vilnius to major EU cities?
            - img [ref=e194]
          - paragraph [ref=e196]: "Road transit from Vilnius: Warsaw 1 day · Berlin 2–3 days · Vienna 2–3 days · Amsterdam 3–4 days · Paris 3–4 days · Istanbul 4–5 days · Madrid 5–6 days. Times vary by service level and customs clearance requirements."
        - generic [ref=e197]:
          - button "Do you handle customs clearance in-house?" [ref=e198] [cursor=pointer]:
            - generic [ref=e199]: Do you handle customs clearance in-house?
            - img [ref=e200]
          - paragraph [ref=e202]: Yes. Our team handles EU import and export declarations, tariff classification, and duty calculation in-house, liaising with Lithuanian customs authorities. We coordinate customs in other countries through our partner network.
        - generic [ref=e203]:
          - button "What cargo types do you accept?" [ref=e204] [cursor=pointer]:
            - generic [ref=e205]: What cargo types do you accept?
            - img [ref=e206]
          - paragraph [ref=e208]: We accept standard dry cargo, temperature-controlled goods, ADR-classified hazardous materials, oversized and heavy loads (with permits), and project cargo. We do not transport narcotics, weapons, or goods prohibited by international sanctions.
        - generic [ref=e209]:
          - button "Is cargo insurance included in your service?" [ref=e210] [cursor=pointer]:
            - generic [ref=e211]: Is cargo insurance included in your service?
            - img [ref=e212]
          - paragraph [ref=e214]: Standard freight rates do not include cargo insurance. We strongly recommend all-risk coverage for every shipment and can arrange it on your behalf. Contact your logistics coordinator for a tailored quote.
