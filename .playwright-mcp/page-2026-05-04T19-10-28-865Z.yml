    - generic [ref=e24]: "Atnaujinta: 2026 m. gegužės 4 d."
    - generic [ref=e25]:
      - paragraph [ref=e26]:
        - text: VORTWAY Logistics & Solutions („VORTWAY", „mes", „mūsų") gerbia jūsų privatumą ir įsipareigoja saugoti jūsų asmens duomenis. Ši privatumo politika paaiškina, kaip renkame, naudojame, saugome ir apsaugome informaciją, kurią pateikiate per mūsų svetainę
        - strong [ref=e27]: vortway.lt
        - text: ir susijusius bendravimo kanalus.
      - paragraph [ref=e28]:
        - text: Ši politika parengta vadovaujantis Reglamentu (ES) 2016/679 (
        - strong [ref=e29]: Bendruoju duomenų apsaugos reglamentu
        - text: ", „BDAR\") ir Lietuvos Respublikos asmens duomenų teisinės apsaugos įstatymu."
    - generic [ref=e30]:
      - heading "1. Duomenų valdytojas" [level=2] [ref=e31]
