<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vortway OG Image</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Montserrat:wght@300;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1200px; height: 630px;
    overflow: hidden;
    background: #030504;
    font-family: 'Montserrat', sans-serif;
    color: #ffffff;
  }
  .frame {
    position: relative;
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background:
      radial-gradient(ellipse 80% 60% at 50% 50%, rgba(212, 175, 55, 0.18) 0%, transparent 65%),
      radial-gradient(ellipse 60% 50% at 20% 90%, rgba(178, 115, 0, 0.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 45% at 80% 10%, rgba(255, 195, 0, 0.10) 0%, transparent 70%),
      linear-gradient(135deg, #050607 0%, #0a0a08 50%, #030504 100%);
  }
  /* Fog grain: two overlapping noise layers using radial gradients to evoke Vanta */
  .fog {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 15% 35%, rgba(212,175,55,0.10) 0%, transparent 22%),
      radial-gradient(circle at 85% 65%, rgba(178,115,0,0.10) 0%, transparent 25%),
      radial-gradient(circle at 45% 85%, rgba(212,175,55,0.06) 0%, transparent 30%);
    filter: blur(8px);
    opacity: 0.95;
  }
  /* Subtle thin frame border in gold */
  .frame::before {
    content: '';
    position: absolute;
    inset: 24px;
    border: 1px solid rgba(212, 175, 55, 0.22);
    pointer-events: none;
    z-index: 2;
  }
  .frame::after {
    /* Bottom-left to bottom-right gold sheen line */
    content: '';
    position: absolute;
    left: 80px; right: 80px; bottom: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(212,175,55,0.55) 50%, transparent 100%);
    z-index: 2;
  }
  .mark {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 460px; height: 480px;
    opacity: 0.08;
    z-index: 1;
    pointer-events: none;
    filter: drop-shadow(0 0 48px rgba(212,175,55,0.20));
  }
  .content {
    position: relative;
    z-index: 3;
    height: 100%;
    padding: 88px 96px;
    display: flex;
    flex-direction: column;
  }
  /* Top eyebrow row */
  .eyebrow {
    display: flex;
    align-items: center;
    gap: 16px;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 6px;
    color: #D4AF37;
    text-transform: uppercase;
  }
  .eyebrow-dot {
    width: 8px; height: 8px;
    background: #D4AF37;
    border-radius: 50%;
    box-shadow: 0 0 12px rgba(212,175,55,0.7);
  }
  /* Center stack — wordmark + tagline */
  .stack {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
  }
  .wordmark {
    font-family: 'Cinzel', serif;
    font-weight: 800;
    font-size: 144px;
    letter-spacing: 18px;
    margin-right: -18px;
    background: linear-gradient(to bottom, #ffffff 35%, #D4AF37 95%);
    -webkit-background-clip: text;
            background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
    margin-bottom: 30px;
    filter: drop-shadow(0 4px 24px rgba(0,0,0,0.6))
            drop-shadow(0 0 40px rgba(212,175,55,0.30));
  }
  .tagline {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 10px;
    color: #D4AF37;
    text-transform: uppercase;
    text-shadow: 0 2px 10px rgba(0,0,0,0.85);
    padding-bottom: 18px;
    border-bottom: 1px solid rgba(212,175,55,0.45);
    display: inline-block;
  }
  /* Bottom row */
  .footer-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 40px;
  }
  .pillars {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 18px;
    letter-spacing: 4px;
    color: #cccccc;
    text-transform: uppercase;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  }
  .pillars span {
    color: rgba(212,175,55,0.65);
    margin: 0 12px;
  }
  .hq {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 14px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    text-align: right;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="fog"></div>

  <!-- Background V+W mark watermark -->
  <svg class="mark" viewBox="-10 -10 220 230">
    <defs>
      <linearGradient id="ogGold" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"  stop-color="#FFFDF0"/>
        <stop offset="20%" stop-color="#FFC300"/>
        <stop offset="50%" stop-color="#B27300"/>
        <stop offset="80%" stop-color="#4A2F00"/>
        <stop offset="100%" stop-color="#0F0900"/>
      </linearGradient>
    </defs>
    <g>
      <path d="M 10 90 L 50 150 L 100 60 L 150 150 L 190 90"
            fill="none" stroke="url(#ogGold)" stroke-width="20"
            stroke-linejoin="round" stroke-linecap="round"/>
    </g>
    <g>
      <path d="M 20 40 L 100 180 L 180 40"
            fill="none" stroke="url(#ogGold)" stroke-width="28"
            stroke-linejoin="miter" stroke-miterlimit="4" stroke-linecap="round"/>
    </g>
  </svg>

  <div class="content">
    <div class="eyebrow">
      <span class="eyebrow-dot"></span>
      <span>Vortway Logistics &amp; Solutions</span>
    </div>

    <div class="stack">
      <div class="wordmark">VORTWAY</div>
      <div class="tagline">Premium European Freight Forwarding</div>
    </div>

    <div class="footer-row">
      <div class="pillars">FTL <span>·</span> LTL <span>·</span> INTERMODAL <span>·</span> CUSTOMS</div>
      <div class="hq">Kaunas · Lithuania</div>
    </div>
  </div>
</div>
</body>
</html>
